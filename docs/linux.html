<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Linux Commands Memo · SkillBox</title>
  <style>
    :root {
      --bg: #0f1420; --panel: #171e2e; --panel-2: #1f293d;
      --text: #e6ecf5; --muted: #93a1bd; --accent: #4f8cff; --accent-2: #2ee6a6;
      --code: #ffd479; --border: #2a3550; --radius: 14px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 50% -200px, #1b2540 0%, var(--bg) 60%);
      color: var(--text); line-height: 1.55; min-height: 100vh;
    }
    .wrap { max-width: 900px; margin: 0 auto; padding: 0 20px; }
    .site-header { padding: 40px 0 10px; text-align: center; }
    .site-header h1 { margin: 0; font-size: 2rem; letter-spacing: -0.5px; }
    .site-header h1 span { color: var(--accent); }
    .tagline { color: var(--muted); margin: 8px 0 0; }
    .backlink { display: inline-block; margin-top: 10px; color: var(--accent); text-decoration: none; font-size: .9rem; }
    .backlink:hover { text-decoration: underline; }

    .toolbar {
      position: sticky; top: 0; z-index: 5; padding: 14px 0;
      background: linear-gradient(180deg, var(--bg) 70%, transparent);
    }
    #search {
      width: 100%; padding: 14px 16px; font-size: 1rem;
      background: var(--panel-2); color: var(--text);
      border: 1px solid var(--border); border-radius: 12px;
    }
    #search::placeholder { color: var(--muted); }
    .count { color: var(--muted); font-size: .82rem; margin: 8px 2px 0; }

    .tier { margin: 26px 0; }
    .tier-head { display: flex; align-items: baseline; gap: 10px; margin: 0 0 6px; }
    .tier-head h2 { margin: 0; font-size: 1.25rem; }
    .badge { font-size: .7rem; padding: 3px 10px; border-radius: 999px; font-weight: 700; letter-spacing: .3px; }
    .badge.hot { background: #3a1d24; color: #ff9db0; }
    .badge.mid { background: #16324a; color: #7ec8ff; }
    .badge.adv { background: #1d3a2c; color: #74e6b0; }
    .tier-desc { color: var(--muted); font-size: .85rem; margin: 0 0 12px; }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }

    .cmd {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 14px;
    }
    .cmd code {
      display: inline-block; font-family: "SF Mono", "Fira Code", Menlo, Consolas, monospace;
      color: var(--code); font-size: .92rem; font-weight: 600;
      background: #0d1320; padding: 3px 8px; border-radius: 6px; border: 1px solid var(--border);
      word-break: break-word;
    }
    .cmd .desc { color: var(--muted); font-size: .88rem; margin-top: 7px; }
    .cmd.hidden { display: none; }
    .tier.hidden { display: none; }
    .noresults { text-align: center; color: var(--muted); padding: 30px; display: none; }

    .site-footer { text-align: center; padding: 30px 0 40px; color: var(--muted); font-size: .82rem; }
    .site-footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <h1>🐧 Linux Commands <span>Memo</span></h1>
      <p class="tagline">A quick cheat sheet grouped by how often you'll actually reach for them.</p>
      <a class="backlink" href="./">← DevOps quiz</a> · <a class="backlink" href="linux-theory.html">📖 Linux Theory</a> · <a class="backlink" href="vim.html">📝 Vim Memo</a> · <a class="backlink" href="grep.html">🔎 grep Memo</a>
    </div>
  </header>

  <main class="wrap">
    <div class="toolbar">
      <input id="search" type="search" placeholder="🔍 Filter commands…  (e.g. 'permission', 'disk', 'process')" autocomplete="off" />
      <p class="count" id="count"></p>
    </div>

    <div id="tiers"></div>
    <p class="noresults" id="noresults">No commands match your search.</p>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p>Part of <a href="https://github.com/skybytescode/skillbox">SkillBox</a> · Inspired by the Skillbox DevOps curriculum</p>
    </div>
  </footer>

  <script>
    const DATA = [
      {
        tier: "Most used", cls: "hot", desc: "Everyday commands — you'll type these constantly.",
        cmds: [
          ["ls -lah", "List files with details, human-readable sizes, including hidden ones"],
          ["cd /path", "Change directory (cd .. goes up, cd ~ goes home, cd - to previous)"],
          ["pwd", "Print the current working directory"],
          ["cat file", "Print a file's contents to the terminal"],
          ["less file", "View a file page by page (q to quit, / to search)"],
          ["cp src dst", "Copy a file or directory (-r for directories)"],
          ["mv src dst", "Move or rename a file or directory"],
          ["rm file", "Remove a file (-r recursive, -f force — be careful)"],
          ["mkdir -p a/b/c", "Create directories, including parents"],
          ["touch file", "Create an empty file or update its timestamp"],
          ["grep 'text' file", "Search for a pattern in files (-r recursive, -i ignore case, -n line numbers)"],
          ["find . -name '*.log'", "Find files by name, type, size, or time"],
          ["nano file", "Edit a file in a simple terminal editor (vim for the classic one)"],
          ["chmod +x script.sh", "Make a file executable (chmod 644, 755 for numeric modes)"],
          ["sudo command", "Run a command as the superuser (root)"],
          ["man command", "Open the manual page for a command (q to quit)"],
          ["history", "Show previously run commands (!n to re-run number n)"],
          ["clear", "Clear the terminal screen (Ctrl+L does the same)"],
          ["echo $VAR", "Print text or the value of a variable"],
          ["ps aux", "List all running processes"],
          ["top", "Live view of processes and resource usage (htop is nicer)"],
          ["kill PID", "Send a signal to a process (kill -9 forces it)"],
          ["df -h", "Show disk space usage per filesystem, human-readable"],
          ["ping host", "Check network connectivity to a host"],
          ["curl -sSL url", "Transfer data from/to a URL (download, call APIs)"],
          ["tail -f file.log", "Follow a file live as new lines are appended"],
          ["head -n 20 file", "Show the first N lines of a file"],
        ],
      },
      {
        tier: "Medium used", cls: "mid", desc: "Come up regularly once you're comfortable in the shell.",
        cmds: [
          ["du -sh *", "Show the size of each item in the current directory"],
          ["chown user:group file", "Change the owner and group of a file (-R recursive)"],
          ["ln -s target link", "Create a symbolic (soft) link"],
          ["tar -czf a.tar.gz dir/", "Create a gzipped archive (-xzf to extract)"],
          ["zip -r a.zip dir/", "Create a zip archive (unzip a.zip to extract)"],
          ["wc -l file", "Count lines (-w words, -c bytes)"],
          ["sort file | uniq -c", "Sort lines and count unique occurrences"],
          ["awk '{print $1}'", "Extract/transform columns from text"],
          ["sed 's/old/new/g' file", "Stream-edit text, e.g. find & replace"],
          ["cut -d: -f1 /etc/passwd", "Cut out fields by delimiter"],
          ["xargs", "Build and run commands from standard input (e.g. find … | xargs rm)"],
          ["diff a b", "Show differences between two files"],
          ["watch -n 2 cmd", "Re-run a command every N seconds and show the output"],
          ["ssh user@host", "Connect to a remote machine over SSH"],
          ["scp file user@host:/path", "Copy files to/from a remote host over SSH"],
          ["rsync -avz src/ dst/", "Efficiently sync files locally or over SSH"],
          ["wget url", "Download files from the web"],
          ["ip a", "Show network interfaces and IP addresses"],
          ["ss -tulpn", "List listening ports and the processes using them"],
          ["netstat -tulpn", "Classic way to list ports/connections"],
          ["systemctl status svc", "Check a service; start/stop/restart/enable to manage it"],
          ["journalctl -u svc -f", "Follow the logs of a systemd service"],
          ["free -h", "Show memory (RAM) usage"],
          ["uname -a", "Show kernel and system information"],
          ["env / export VAR=x", "List environment variables / set one for child processes"],
          ["alias ll='ls -lah'", "Create a shortcut for a command"],
          ["crontab -e", "Edit scheduled (cron) jobs for the current user"],
          ["which cmd / type cmd", "Show the path/type of a command"],
          ["ln, basename, dirname", "Path helpers used in scripts"],
        ],
      },
      {
        tier: "Advanced / occasional", cls: "adv", desc: "Powerful tools you'll reach for in specific situations.",
        cmds: [
          ["lsof -i :8080", "List open files / what's using a port"],
          ["strace -p PID", "Trace system calls made by a process"],
          ["nc -zv host 22", "Netcat: test ports, transfer data, simple servers"],
          ["dig / nslookup host", "Query DNS records for a domain"],
          ["traceroute host", "Show the network path to a host"],
          ["iptables -L / nft", "Inspect/manage firewall rules"],
          ["ufw allow 22", "Simplified firewall management"],
          ["mount / umount", "Attach or detach filesystems"],
          ["lsblk / fdisk -l", "List block devices and partitions"],
          ["dd if=… of=…", "Low-level copy — disk images, bootable USBs (dangerous)"],
          ["nohup cmd &", "Run a command immune to hangups, in the background"],
          ["screen / tmux", "Persistent terminal sessions you can detach/reattach"],
          ["chroot", "Run a command with a different root directory"],
          ["nice / renice", "Change process scheduling priority"],
          ["ionice", "Set I/O scheduling priority for a process"],
          ["setfacl / getfacl", "Fine-grained access control lists beyond rwx"],
          ["usermod -aG group user", "Add a user to a group"],
          ["visudo", "Safely edit the sudoers file"],
          ["update-alternatives", "Manage default versions of commands (e.g. python)"],
          ["apt / dnf / yum / pacman", "Install and manage packages (distro-dependent)"],
          ["ldd binary", "Show shared library dependencies of a binary"],
          ["tee file", "Write stdin to a file and stdout at the same time"],
          ["trap 'cmd' SIGINT", "Catch signals in shell scripts"],
          ["getent hosts name", "Query system databases (hosts, passwd, group)"],
          ["stat file", "Detailed file metadata (inode, timestamps, perms)"],
        ],
      },
    ];

    const tiersEl = document.getElementById("tiers");
    const total = DATA.reduce((n, t) => n + t.cmds.length, 0);

    for (const t of DATA) {
      const section = document.createElement("section");
      section.className = "tier";
      section.innerHTML =
        `<div class="tier-head"><h2>${t.tier}</h2><span class="badge ${t.cls}">${t.cmds.length} cmds</span></div>` +
        `<p class="tier-desc">${t.desc}</p>`;
      const grid = document.createElement("div");
      grid.className = "grid";
      for (const [cmd, desc] of t.cmds) {
        const div = document.createElement("div");
        div.className = "cmd";
        div.dataset.text = (cmd + " " + desc).toLowerCase();
        div.innerHTML = `<code></code><div class="desc"></div>`;
        div.querySelector("code").textContent = cmd;
        div.querySelector(".desc").textContent = desc;
        grid.appendChild(div);
      }
      section.appendChild(grid);
      tiersEl.appendChild(section);
    }

    const search = document.getElementById("search");
    const countEl = document.getElementById("count");
    const noResults = document.getElementById("noresults");
    countEl.textContent = `${total} commands`;

    search.addEventListener("input", () => {
      const q = search.value.trim().toLowerCase();
      let shown = 0;
      for (const section of document.querySelectorAll(".tier")) {
        let visibleInSection = 0;
        for (const card of section.querySelectorAll(".cmd")) {
          const match = !q || card.dataset.text.includes(q);
          card.classList.toggle("hidden", !match);
          if (match) { shown++; visibleInSection++; }
        }
        section.classList.toggle("hidden", visibleInSection === 0);
      }
      countEl.textContent = q ? `${shown} of ${total} commands` : `${total} commands`;
      noResults.style.display = shown === 0 ? "block" : "none";
    });
  </script>
</body>
</html>
